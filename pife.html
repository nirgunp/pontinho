<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pife!</title>
  <link rel="icon" type="image/png" href="icopife.png">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f7f3ec;
      color: #333;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
    }

    img.app-icon {
      width: 256px;
      height: 256px;
      border-radius: 32px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .store-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .store-buttons img {
      height: 60px;
    }

    .contact {
      font-size: 0.95rem;
      color: #555;
    }

    a {
      color: #3366cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icopife.png" alt="Ícone do Pife!" class="app-icon">

    <h1>Pife!</h1>
    <p>
      Jogue Pife no seu celular! Divirta-se em partidas offline contra bots
      ou entre no modo online para disputar mesas com outros jogadores em tempo real.
    </p>

    <div class="store-buttons">
      <a href="https://play.google.com/store/apps/details?id=com.tobias.pife&hl=pt_BR" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Disponível no Google Play">
      </a>

      <a href="https://apps.apple.com/br/app/pife/idSEU_APP_ID" target="_blank">
        <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Baixar na App Store">
      </a>
    </div>

    <div class="contact">
      <p>Suporte e contato: <a href="mailto:tobias.lucian@yahoo.com.br">tobias.lucian@yahoo.com.br</a></p>
    </div>
  </div>
</body>
</html>
